<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" fill="#8B4513" rx="15"/>
  
  <!-- Couch/Sofa shape -->
  <g fill="#D2691E">
    <!-- Main seat -->
    <rect x="15" y="45" width="70" height="30" rx="5"/>
    
    <!-- Left armrest -->
    <rect x="10" y="40" width="10" height="40" rx="3"/>
    
    <!-- Right armrest -->
    <rect x="80" y="40" width="10" height="40" rx="3"/>
    
    <!-- Back cushion -->
    <rect x="20" y="30" width="60" height="15" rx="3"/>
  </g>
  
  <!-- Cushion details -->
  <circle cx="35" cy="60" r="8" fill="#CD853F" opacity="0.7"/>
  <circle cx="50" cy="60" r="8" fill="#CD853F" opacity="0.7"/>
  <circle cx="65" cy="60" r="8" fill="#CD853F" opacity="0.7"/>
  
  <!-- Decorative text -->
  <text x="50" y="85" font-size="12" font-weight="bold" fill="white" text-anchor="middle" font-family="Arial">शF</text>
</svg>
